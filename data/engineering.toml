# Engineering units
# psi, hp are in imperial.toml

[units]
ksi      = { scale = 6894757.293168,   dim = [-1, 1, -2, 0, 0, 0, 0] }
Ah       = { scale = 3600.0,           dim = [0, 0, 1, 1, 0, 0, 0] }
Wh       = { scale = 3600.0,           dim = [2, 1, -2, 0, 0, 0, 0] }
VA       = { scale = 1.0,              dim = [2, 1, -3, 0, 0, 0, 0] }
# Viscosity
cP       = { scale = 1e-3,             dim = [-1, 1, -1, 0, 0, 0, 0] }  # centipoise
P        = { scale = 0.1,              dim = [-1, 1, -1, 0, 0, 0, 0] }  # poise
cSt      = { scale = 1e-6,             dim = [2, 0, -1, 0, 0, 0, 0] }   # centistokes
St       = { scale = 1e-4,             dim = [2, 0, -1, 0, 0, 0, 0] }   # stokes
# Data
bit      = { scale = 1.0,              dim = [0, 0, 0, 0, 0, 0, 0] }
byte     = { scale = 8.0,              dim = [0, 0, 0, 0, 0, 0, 0] }
B        = { scale = 8.0,              dim = [0, 0, 0, 0, 0, 0, 0] }
