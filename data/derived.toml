# SI derived units

[common]
N   = { scale = 1.0,   dim = [1, 1, -2, 0, 0, 0, 0],   alias = true }
J   = { scale = 1.0,   dim = [2, 1, -2, 0, 0, 0, 0],   alias = true }
W   = { scale = 1.0,   dim = [2, 1, -3, 0, 0, 0, 0],   alias = true }
Pa  = { scale = 1.0,   dim = [-1, 1, -2, 0, 0, 0, 0],  alias = true }
V   = { scale = 1.0,   dim = [2, 1, -3, -1, 0, 0, 0],  alias = true }
Ohm = { scale = 1.0,   dim = [2, 1, -3, -2, 0, 0, 0],  alias = true }
F   = { scale = 1.0,   dim = [-2, -1, 4, 2, 0, 0, 0],  alias = true }
Hz  = { scale = 1.0,   dim = [0, 0, -1, 0, 0, 0, 0],   alias = true }
C   = { scale = 1.0,   dim = [0, 0, 1, 1, 0, 0, 0],    alias = true }
H   = { scale = 1.0,   dim = [2, 1, -2, -2, 0, 0, 0],  alias = true }
T   = { scale = 1.0,   dim = [0, 1, -2, -1, 0, 0, 0],  alias = true }
Wb  = { scale = 1.0,   dim = [2, 1, -2, -1, 0, 0, 0],  alias = true }
lm  = { scale = 1.0,   dim = [0, 0, 0, 0, 0, 0, 1],    alias = true }
lx  = { scale = 1.0,   dim = [-2, 0, 0, 0, 0, 0, 1],   alias = true }
S   = { scale = 1.0,   dim = [-2, -1, 3, 2, 0, 0, 0],  alias = true }
Bq  = { scale = 1.0,   dim = [0, 0, -1, 0, 0, 0, 0] }
Gy  = { scale = 1.0,   dim = [2, 0, -2, 0, 0, 0, 0] }
Sv  = { scale = 1.0,   dim = [2, 0, -2, 0, 0, 0, 0] }
kat = { scale = 1.0,   dim = [0, 0, -1, 0, 0, 1, 0] }
