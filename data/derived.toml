# SI derived units -- always loaded

[units]
N   = { scale = 1.0,   dim = [1, 1, -2, 0, 0, 0, 0] }   # newton
J   = { scale = 1.0,   dim = [2, 1, -2, 0, 0, 0, 0] }   # joule
W   = { scale = 1.0,   dim = [2, 1, -3, 0, 0, 0, 0] }   # watt
Pa  = { scale = 1.0,   dim = [-1, 1, -2, 0, 0, 0, 0] }  # pascal
V   = { scale = 1.0,   dim = [2, 1, -3, -1, 0, 0, 0] }  # volt
Ohm = { scale = 1.0,   dim = [2, 1, -3, -2, 0, 0, 0] }  # ohm
F   = { scale = 1.0,   dim = [-2, -1, 4, 2, 0, 0, 0] }  # farad
Hz  = { scale = 1.0,   dim = [0, 0, -1, 0, 0, 0, 0] }   # hertz
C   = { scale = 1.0,   dim = [0, 0, 1, 1, 0, 0, 0] }    # coulomb
H   = { scale = 1.0,   dim = [2, 1, -2, -2, 0, 0, 0] }  # henry
T   = { scale = 1.0,   dim = [0, 1, -2, -1, 0, 0, 0] }  # tesla
Wb  = { scale = 1.0,   dim = [2, 1, -2, -1, 0, 0, 0] }  # weber
lm  = { scale = 1.0,   dim = [0, 0, 0, 0, 0, 0, 1] }    # lumen
lx  = { scale = 1.0,   dim = [-2, 0, 0, 0, 0, 0, 1] }   # lux
S   = { scale = 1.0,   dim = [-2, -1, 3, 2, 0, 0, 0] }  # siemens
Bq  = { scale = 1.0,   dim = [0, 0, -1, 0, 0, 0, 0] }   # becquerel
Gy  = { scale = 1.0,   dim = [2, 0, -2, 0, 0, 0, 0] }   # gray
Sv  = { scale = 1.0,   dim = [2, 0, -2, 0, 0, 0, 0] }   # sievert
kat = { scale = 1.0,   dim = [0, 0, -1, 0, 0, 1, 0] }   # katal

[derived]
N   = [1, 1, -2, 0, 0, 0, 0]
J   = [2, 1, -2, 0, 0, 0, 0]
W   = [2, 1, -3, 0, 0, 0, 0]
Pa  = [-1, 1, -2, 0, 0, 0, 0]
V   = [2, 1, -3, -1, 0, 0, 0]
Ohm = [2, 1, -3, -2, 0, 0, 0]
F   = [-2, -1, 4, 2, 0, 0, 0]
Hz  = [0, 0, -1, 0, 0, 0, 0]
C   = [0, 0, 1, 1, 0, 0, 0]
H   = [2, 1, -2, -2, 0, 0, 0]
T   = [0, 1, -2, -1, 0, 0, 0]
Wb  = [2, 1, -2, -1, 0, 0, 0]
lm  = [0, 0, 0, 0, 0, 0, 1]
lx  = [-2, 0, 0, 0, 0, 0, 1]
