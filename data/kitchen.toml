# Cooking units
# Volume measures (cup, tbs, tsp, floz, qt, pt) are in imperial.toml
# This set is a convenience alias that loads imperial volume units.
# Add cooking-specific units here that don't belong elsewhere.

[kitchen]
# pinch is roughly 1/16 tsp
pinch = { scale = 3.080576e-7, dim = [3, 0, 0, 0, 0, 0, 0] }
# dash is roughly 1/8 tsp
dash  = { scale = 6.161152e-7, dim = [3, 0, 0, 0, 0, 0, 0] }
